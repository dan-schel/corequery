<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Demo App</title>
    <meta name="description" content="This is a CoreQuery demo app." />
    <meta name="corequery-app-name" content="Demo App" />
    <meta name="corequery-frontend-version" content="demo-app" />
    <meta name="corequery-package-version-on-last-update" content="demo-app" />
    <meta name="corequery-server-version-on-last-update" content="demo-app" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="mask-icon" href="/favicon.svg" color="#FFFFFF" />
    <meta name="theme-color" content="#242933" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <script>
      (() => {
        const preference = window.matchMedia("(prefers-color-scheme: dark)");

        function getStoredTheme() {
          try {
            const parsed = JSON.parse(
              localStorage.getItem("corequery-settings"),
            );
            const theme = parsed?.theme;
            if (theme === "light" || theme === "dark") return theme;
            return null;
          } catch {
            return null;
          }
        }

        function applyTheme() {
          const theme = getStoredTheme();

          document.body.classList.remove("light", "dark");
          if (theme != null) {
            document.body.classList.add(theme);
          }

          const themeColor = {
            light: "#ffffff",
            dark: "#242933",
          }[theme ?? (preference.matches ? "dark" : "light")];

          const themeMetaTag = document.querySelector(
            'meta[name="theme-color"]',
          );
          themeMetaTag?.setAttribute("content", themeColor);
        }

        applyTheme();
        preference.addEventListener("change", applyTheme);

        window.applyTheme = applyTheme;
      })();
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
